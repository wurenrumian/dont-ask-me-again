name: Release

on:
  push:
    tags:
      - "*"

jobs:
  plugin-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build plugin
        run: pnpm run build

      - name: Validate release version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            manifest.json
            main.js
            styles.css
            versions.json

  runtime-release:
    runs-on: windows-latest
    needs: plugin-release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Create server virtual environment
        run: uv venv server/.venv

      - name: Install server dependencies
        working-directory: server
        run: uv pip install --python .venv/Scripts/python.exe -r requirements.txt

      - name: Build Windows runtime package
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File server/scripts/build-runtime.ps1

      - name: Upload Windows runtime asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            server/dist/dont-ask-me-again-server-win-x64.zip
